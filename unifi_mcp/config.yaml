name: mcp-unifi
version: 0.0.1
slug: unifi_mcp
description: >
  MCP server for UniFi Network — exposes local UniFi controller API
  as Model Context Protocol tools for AI assistants. Runs as a
  Supervisor-managed add-on on Home Assistant OS.
url: https://github.com/pete-builds/mcp-unifi
startup: application
init: false
# map to /app inside container – Supervisor writes options.json here
panel_icon: mdi:network
arch:
  - amd64
  - aarch64
ports:
  3714/tcp:
    description: >
      MCP server HTTP port. Configure your AI assistant's MCP client
      (e.g. Claude Desktop, Claude Code) to connect via
      http://<home-assistant-ip>:3714/mcp using streamable-http transport.
    host: 3714
    container: 3714
ports_description:
  3714/tcp: MCP server streamable-http endpoint
# No `image:` key — Supervisor builds unifi_mcp/Dockerfile locally.
# All option -> env var injection is handled by run.sh at container
# start (parses /data/options.json with jq), not by a static
# `environment:` block, since env values need to come from options.
options:
  schema:
    type: object
    required:
      - auth_tokens
    properties:
      stub_mode:
        type: boolean
        default: true
        description: >
          Enable stub/demo mode (no real UniFi controller required).
          Set false and fill UNIFI_HOST / UNIFI_API_KEY for real use.
      unifi_host:
        type: string
        default: ""
        example: "192.168.1.1"
        description: >
          Hostname or IP of your UniFi gateway/controller
          (e.g. 192.168.1.1). Required when stub_mode is false.
      unifi_api_key:
        type: string
        default: ""
        description: >
          UniFi local API key. Generate in the UniFi OS console under
          System > API Keys. Required when stub_mode is false.
      modules_enabled:
        type: string
        default: "network"
        description: >
          Comma-separated list of MCP modules to enable.
          Defaults to "network". See upstream docs for available modules.
      auth_tokens:
        type: string
        default: ""
        example: '{"example.com": "cloudflare-token-value"}'
        description: >
          JSON object of cloudflare-api-tokens for each domain when
          MCP_UNIFI_MODULES_ENABLED includes "dns" or "cloudflare"
          features. Stored encrypted. Passed as MCP_UNIFI_AUTH_TOKENS
          to the server.
      controllers_file:
        type: string
        default: ""
        description: >
          Path to a JSON file listing multiple UniFi controllers
          (for multi-site setups). Leave blank for single-controller use.
  advanced: true
schema_json: '{"type":"object","properties":{"stub_mode":{"type":"boolean","default":true},"unifi_host":{"type":"string","default":""},"unifi_api_key":{"type":"string","default":""},"modules_enabled":{"type":"string","default":"network"},"auth_tokens":{"type":"string","default":""},"controllers_file":{"type":"string","default":""}},"required":["auth_tokens"]}'
